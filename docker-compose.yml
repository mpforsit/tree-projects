# Local development only (CLAUDE.md): Postgres 16 + mailpit for OTP mails.
# Staging/production run on Coolify (docs/OPS.md), not via this file.
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: lean_owner
      POSTGRES_PASSWORD: lean
      POSTGRES_DB: lean
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  mailpit:
    image: axllent/mailpit
    ports:
      - "8025:8025" # web UI
      - "1025:1025" # SMTP

volumes:
  pgdata:
